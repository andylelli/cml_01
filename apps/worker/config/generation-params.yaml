# Central generation tuning parameters.
#
# Single-source config for runtime-adjustable generation/scoring-adjacent knobs.
# Override path with env var: CML_GENERATION_PARAMS_PATH
#
# Notes:
# - Values outside supported ranges are clamped by the loader in
#   packages/story-validation/src/generation-params.ts.
# - Keep this file focused on runtime tuning (not feature flags).
# - Agent 1-9 sections below are runtime-consumed by their corresponding
#   generation/audit paths.

agent1_setting:
  status: implemented
  params:
    model:
      temperature: 0.6
      max_tokens: 2000
    generation:
      default_max_attempts: 3

agent2_cast:
  status: implemented
  params:
    model:
      temperature: 0.75
      max_tokens: 6000
    generation:
      default_max_attempts: 3
    quality:
      role_archetype:
        min_unique_ratio: 0.7
      culpability:
        max_possible_culprits: 3

agent2b_profiles:
  status: implemented
  params:
    model:
      temperature: 0.6
      max_tokens: 8000
    generation:
      default_max_attempts: 3

agent2c_location_profiles:
  status: implemented
  params:
    model:
      temperature: 0.6
      max_tokens: 8000  # raised from 4500: atmosphere block at end of JSON was being truncated
    generation:
      default_max_attempts: 3  # raised from 2: two attempts insufficient for complex nested output

agent2d_temporal_context:
  status: implemented
  params:
    model:
      temperature: 0.7
      max_tokens: 4500
    generation:
      default_max_attempts: 2

agent2e_background_context:
  status: implemented
  params:
    model:
      temperature: 0.4
      max_tokens: 1200
    generation:
      default_max_attempts: 2

agent3_cml:
  status: implemented
  params:
    generation:
      default_max_attempts: 3
    inference_requirements:
      default_max_steps: 5
    quality:
      evidence_clue_backfill_threshold: 3
      fail_when_backfill_exceeds_threshold: true

agent3b_hard_logic_devices:
  status: implemented
  params:
    model:
      temperature: 0.7
      max_tokens: 4000
    generation:
      default_max_attempts: 3

agent4_cml_validator:
  status: implemented
  params:
    model:
      temperature: 0.5
      max_tokens: 8000
    generation:
      default_max_attempts: 5
    inference_requirements:
      default_max_steps: 5

agent5_clues:
  status: implemented
  params:
    model:
      temperature: 0.4
      max_tokens: 3000

agent6_fairplay:
  status: implemented
  params:
    audit:
      model:
        temperature: 0.3
        max_tokens: 2500
    blind_reader:
      model:
        temperature: 0.2
        max_tokens: 1500
      pass_criteria:
        min_confidence: likely
        max_remediation_cycles: 1
    retries:
      max_fair_play_attempts: 2
      max_total_attempts_with_targeted_regen: 3
      max_retry_cost_usd: 0.15

agent7_narrative:
  status: implemented
  params:
    model:
      temperature: 0.5
      max_tokens: 16000
    pacing:
      min_clue_scene_ratio: 0.6
      act_distribution:
        act1_ratio: 0.28
        act2_ratio: 0.47

agent65_world_builder:
  status: implemented
  params:
    model:
      temperature: 0.7
      max_tokens: 6000
    generation:
      default_max_attempts: 2
    quality:
      # Hard floor for arcDescription (words). Responses below this fail the gate.
      # Supported range: 50 - 1000
      arc_description_gate: 200
      # Extra words added on top of arc_description_gate when instructing the LLM.
      # Acts as a safety buffer so natural LLM undershoot still clears the gate.
      # Supported range: 0 - 500
      arc_description_prompt_buffer: 100

agent8_novelty:
  status: implemented
  params:
    model:
      temperature: 0.3
      max_tokens: 2500
    thresholds:
      similarity_threshold_default: 0.9
      fail_delta: 0.1
    weighting:
      plot: 0.3
      character: 0.25
      setting: 0.15
      solution: 0.25
      structural: 0.05

agent9_prose:
  story_length_policy:
    # Narrative/prose sizing policy by story length.
    # Scenes == chapters: Agent7 emits one scene per chapter and Agent9 keeps a 1:1 mapping.
    # chapter_target_tolerance is used by completeness scoring only.
    chapter_target_tolerance: 2
    # Per-length chapter plan.
    # total_ideal_words = chapter_count * chapter_ideal_words
    word_targets:
      short:
        chapter_ideal_words: 1000
        chapter_count: 10
      medium:
        chapter_ideal_words: 1700
        chapter_count: 20
      long:
        chapter_ideal_words: 2200
        chapter_count: 30

    # Derived total-word bounds as ratios of total ideal words.
    # total_min_words = floor(chapter_count * chapter_ideal_words * min_ratio)
    # total_max_words = ceil(chapter_count * chapter_ideal_words * max_ratio)
    total_word_budget_ratio:
      # Supported range: 0.1 - 2.0
      min_ratio: 0.75
      # Supported range: 0.2 - 3.0
      max_ratio: 1.25

  underflow_expansion:
    # Master switch — set to false to skip the expansion LLM call entirely.
    # When disabled, under-target chapters go straight to retry.
    enabled: false
    # Ratio-based expansion sizing relative to chapter_ideal_words.
    # min_additional_words = floor(chapter_ideal_words * min_additional_words_ratio)
    # max_additional_words = ceil(chapter_ideal_words * max_additional_words_ratio)
    # buffer_words = round(chapter_ideal_words * buffer_words_ratio)
    expansion_size_ratio:
      # Supported range: 0.01 - 1.50
      min_additional_words_ratio: 0.16
      # Supported range: 0.05 - 3.00
      max_additional_words_ratio: 0.56
      # Supported range: 0.00 - 2.00
      buffer_words_ratio: 0.18
    # LLM call tuning for underflow expansion path
    # Supported range: 0.0 - 1.0
    temperature: 0.18
    # Ratio-based token budget for the expansion call.
    # max_tokens = ceil(chapter_ideal_words * max_tokens_ratio)
    # Example (medium, 1700 ideal words): 1700 * 1.76 ~= 3000 tokens.
    # Supported range: 0.5 - 10.0
    max_tokens_ratio: 1.76
    # Only fire expansion for preferred-miss (non-hard-floor) chapters when the chapter is
    # below this fraction of the preferred word target. Prevents expansion from firing on
    # every chapter just because they are marginally below the aspirational preferred count.
    # e.g. 0.85 → fire when wordCount < preferredWords * 0.85 (e.g. < 1360 for medium).
    # Set to 1.0 to always expand on preferred-miss; 0.0 to never expand on preferred-miss.
    # Supported range: 0.0 - 1.0
    preferred_miss_expansion_ratio: 0.85

  generation:
    # Default batch retry cap (can still be overridden by call-site argument)
    # Supported range: 1 - 8
    default_max_attempts: 4

  prose_model:
    # Main chapter-generation call tuning
    # Supported range: 0.0 - 1.0
    temperature: 0.42
    # Hard cap for chapter batch size in generateProse
    # Supported range: 1 - 20
    max_batch_size: 10

  style_linter:
    entropy:
      standard:
        # Adaptive chapter-count buckets for entropy floor in standard mode
        # Supported range: 1 - 20
        early_chapter_max: 6
        # Supported range: 0.0 - 2.0
        early_threshold: 0.62
        # Supported range: 2 - 30
        mid_chapter_max: 10
        # Supported range: 0.0 - 2.0
        mid_threshold: 0.7
        # Supported range: 0.0 - 2.0
        late_threshold: 0.70
      # Repair-mode entropy profile
      # Supported range: 0.0 - 2.0
      repair_threshold: 0.62
      # Supported range: 2 - 20
      min_window_standard: 3
      # Supported range: 2 - 20
      min_window_repair: 5
      # Supported range: 0 - 20
      warmup_chapters_standard: 0
      # Supported range: 0 - 20
      warmup_chapters_repair: 4
      # Opening-style history windows
      # Supported range: prior 1 - 30, total 2 - 40
      opening_styles_prior_window: 6
      opening_styles_total_window: 8

    # Exact paragraph dedupe minimum length
    # Supported range: 80 - 800
    paragraph_fingerprint_min_chars: 170

    ngram:
      # Near-duplicate detection settings
      # Supported range: 50 - 800
      min_chars: 140
      # Supported range: 2 - 12
      gram_size: 6
      # Supported range: 0.0 - 1.0
      overlap_threshold: 0.62
      # Supported range: 1 - 200
      min_candidate_ngrams: 10
      # Supported range: 1 - 200
      prior_paragraph_limit: 25

  scoring_adapter:
    discriminating:
      # Semantic signal thresholds for discriminating-test chapter detection
      # Supported range: 0.0 - 1.0
      semantic_token_match_ratio: 0.28
      # Supported range: 1 - 10
      min_semantic_token_matches: 2
      # Supported range: 1 - 50
      max_semantic_tokens: 14

    clue_semantic:
      # Semantic clue matching thresholds
      # Supported range: 0.0 - 1.0
      token_match_ratio: 0.28
      # Supported range: 1 - 10
      min_token_matches: 2
      # Supported range: 0.0 - 1.0
      confidence_cap: 0.9
      # Supported range: 1 - 40
      signature_tokens_from_distribution: 10
      # Supported range: 1 - 40
      signature_tokens_from_id_fallback: 8

    fair_play:
      # Spoiler scan window as first fraction of chapters
      # Supported range: 0.1 - 1.0
      spoiler_early_chapter_ratio: 0.5

  scorer:
    completeness:
      word_count:
        # If overall words >= targetMin * low_ratio, score as low band instead of major underflow
        # Supported range: 0.0 - 1.0
        low_ratio: 0.8
        # Supported range: 0 - 100
        low_score: 70
      clue_visibility:
        # Supported range: 0.0 - 1.0
        pass_ratio: 0.95
        # Supported range: 0.0 - 1.0
        minor_gap_ratio: 0.8
        # Supported range: 0 - 100
        minor_gap_score: 85

  validation:
    # Enable/disable pronoun consistency checking in chapter validation
    pronoun_checking_enabled: true
