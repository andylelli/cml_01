# Character Profiles Artifact Schema
# Generated by Agent 2b: Character Profile Generator
# Expands cast details into full narrative profiles with psychological depth

status:
  type: string
  required: true
  allowed: [draft, final]

tone:
  type: string
  required: false

targetWordCount:
  type: number
  required: false

profiles:
  type: array
  required: true
  items:
    type: object
    fields:
      name:
        type: string
        required: true
      summary:
        type: string
        required: false
      publicPersona:
        type: string
        required: false
      privateSecret:
        type: string
        required: false
      motiveSeed:
        type: string
        required: false
      motiveStrength:
        type: string
        required: false
        allowed: [weak, moderate, strong, compelling]
      alibiWindow:
        type: string
        required: false
      accessPlausibility:
        type: string
        required: false
      stakes:
        type: string
        required: false
      humourStyle:
        type: string
        required: false
        allowed: [understatement, dry_wit, polite_savagery, self_deprecating, observational, deadpan, sardonic, blunt, none]
      humourLevel:
        type: number
        required: false
      speechMannerisms:
        type: string
        required: false
      physicalMannerisms:
        type: string
        required: false
        description: >
          How this character moves, sits, gestures — physical tells under stress. Separate from
          speech. E.g. 'Keeps very still when lying; touches the back of her neck when uncertain;
          never sits with her back to a door.' These are the micro-tells that make characters
          visible on the page. Agent 9 should deploy at most one per scene, not as a list.
      internalConflict:
        type: string
        required: false
        description: "The character's internal psychological tension or moral struggle"
      personalStakeInCase:
        type: string
        required: false
        description: "Why this case matters personally to this character (especially important for the detective)"
      privateLonging:
        type: string
        required: false
        description: >
          What this character wants that has nothing to do with the case. A personal desire,
          ambition, or grief that predates the murder and runs underneath the investigation.
          E.g. 'Wants to leave the village but has cared for her mother for fifteen years and
          cannot admit this makes her angry.' This non-case want creates the humanity that
          stops suspects from being props. Agent 9 should let it leak into one or two moments.
      gender:
        type: string
        required: false
        allowed: [male, female, non-binary]
      paragraphs:
        type: array
        required: true
        items: string
      order:
        type: number
        required: false

note:
  type: string
  required: false

cost:
  type: number
  required: true

durationMs:
  type: number
  required: true
