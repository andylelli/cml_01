# World Document Artifact Schema
# Generated by Agent 6.5: World Builder
#
# The World Document is the synthesised narrative brief produced after all enrichment
# phases (Agents 1–5, 2b, 2c, 2d, 2e, 3b) are complete and before the narrative
# outline and prose are generated.
#
# It translates structured CML + enrichment data into a coherent, humanised description
# of the story's world: the historical moment, the people who inhabit it, the emotional
# arc, and the placement of humour. It is consumed by Agent 7 (outline) and Agent 9 (prose).
#
# The World Document is stored as WORLD_DOCUMENT inside the full CML file so that it
# is part of the single source of truth for the story.

status:
  type: string
  required: true
  allowed: [draft, final]

# ── Section 1 ──────────────────────────────────────────────────────────────────
# The Historical Moment
# A focused account of the specific lived experience of this era at this date.
historicalMoment:
  type: object
  required: true
  fields:
    specificDate:
      type: string
      required: true
      description: "Human-readable form of the story date, e.g. 'November 1940'"
    eraRegister:
      type: string
      required: true
      description: >
        One focused paragraph (200–300 words) describing the lived experience of this
        specific historical moment. Must be dateable — a reader should be able to identify
        the approximate year from this text alone. Must not be generic decade description.
    currentTensions:
      type: array
      required: true
      items: string
      description: >
        2–4 specific current events or conditions that any person in this setting would
        be aware of and feel. Each item is a concrete fact, not a generalisation.
        E.g. "Petrol rationing came into force three weeks ago" not "There was rationing."
    physicalConstraints:
      type: array
      required: true
      items: string
      description: >
        Era-specific physical constraints relevant to how people move, communicate,
        and behave in this story. E.g. blackout enforced after 6pm, telephone calls
        routed through exchange operator, no private cars available.
    emotionalRegister:
      type: string
      required: true
      description: >
        The dominant emotional atmosphere of this historical moment as felt by civilians
        in this setting. One sentence. E.g. "Grim determined normality with an undertow
        of dread" or "Exhausted relief, still unable to fully believe the danger has passed."
    wartimeServiceContext:
      type: object
      required: false
      description: >
        Present only for stories set September 1939 – August 1945. Describes the
        wartime service landscape relevant to this story's cast.
      fields:
        serviceStatus:
          type: string
          required: true
          description: >
            Which characters are in military service, which are in reserved occupations,
            which are exempt (and why), which are in civilian war work. One paragraph.
        socialTexture:
          type: string
          required: true
          description: >
            What it means socially in this setting for a man of service age to be in
            civilian clothes. What questions this raises. What characters feel about it.
        absenceEffect:
          type: string
          required: false
          description: >
            If any cast members are absent due to war service (or recently returned),
            what effect does this have on the story's social dynamic?

# ── Section 2 ──────────────────────────────────────────────────────────────────
# Character-in-Era Portraits
# One paragraph per cast member grounding them in the historical moment.
characterPortraits:
  type: array
  required: true
  items:
    type: object
    fields:
      name:
        type: string
        required: true
        description: "Must match a cast member name in CASE.cast"
      portrait:
        type: string
        required: true
        description: >
          80–120 words. Describes this character's specific relationship to the
          historical moment. References at least one CML fact (motive seed, private
          secret, or behavioral tell). States what the character wants right now and
          what they fear. Does not introduce new facts beyond CML + character profiles.
      eraIntersection:
        type: string
        required: true
        description: >
          One sentence. How the specific historical moment intersects with this
          character's private situation. E.g. "His reserved occupation keeps him home
          while his younger brother is in France — a fact he never mentions and that
          everyone notices."

# ── Section 3 ──────────────────────────────────────────────────────────────────
# Character Voice Sketches
# Concrete dialogue fragments per cast member, not attribute descriptions.
characterVoiceSketches:
  type: array
  required: true
  items:
    type: object
    fields:
      name:
        type: string
        required: true
        description: "Must match a cast member name in CASE.cast"
      voiceDescription:
        type: string
        required: true
        description: >
          One sentence describing the character's speech pattern without using the
          abstract humour label. Functional, concrete. E.g. "Speaks in short complete
          sentences, rarely finishes a thought aloud, lets pauses do the work."
      fragments:
        type: array
        required: true
        items:
          type: object
          fields:
            register:
              type: string
              required: true
              allowed: [comfortable, evasive, stressed, humorous, formal]
              description: "The emotional register this fragment demonstrates"
            text:
              type: string
              required: true
              description: >
                2–4 lines of actual dialogue or interior monologue in the character's
                voice. No attribution, no stage directions, no plot information.
                Must feel like this specific character, in this era, in this story.
        description: "Must contain at least 3 fragments covering at least 2 different registers"
      humourNote:
        type: string
        required: false
        description: >
          Present only for characters with humourLevel > 0 in character profiles.
          One sentence describing exactly what form their wit takes in practice.
          E.g. "Uses understatement to deflect; the joke is always at his own expense
          never anyone else's, which makes it feel safe when it isn't."

# ── Section 4 ──────────────────────────────────────────────────────────────────
# Location Emotional Registers
# One paragraph per key location describing how it feels, not just what it is.
locationRegisters:
  type: array
  required: true
  items:
    type: object
    fields:
      locationId:
        type: string
        required: true
        description: "Must match a keyLocation id from LOCATION_PROFILES.keyLocations"
      name:
        type: string
        required: true
      emotionalRegister:
        type: string
        required: true
        description: >
          60–100 words. What it feels like to be in this location given the story's
          specific circumstances — not generic atmosphere but the feeling of this
          place in this story. Concrete and imagistic. References at least one
          sensory detail from the location profile.
      eraNote:
        type: string
        required: false
        description: >
          If the era imposes a specific constraint on this location (blackout,
          requisitioned use, wartime restriction) note it here. One sentence.
      cameraAngle:
        type: string
        required: true
        description: >
          One sentence describing the best point-of-view approach to this location
          for prose. Not a photography metaphor — an emotional stance. E.g. "Enter
          from outside, feel the warmth as a contrast to the cold, then notice what
          is wrong with it."

# ── Section 5 ──────────────────────────────────────────────────────────────────
# The Story's Emotional Arc
storyEmotionalArc:
  type: object
  required: true
  fields:
    dominantRegister:
      type: string
      required: true
      description: >
        One sentence. The story's overall emotional character. E.g.
        "A cold intellectual puzzle with moments of unexpected warmth that make
        the final revelation land harder than the reader expected."
    arcDescription:
      type: string
      required: true
      description: >
        300–400 words of flowing prose describing the emotional journey from
        opening to close. Describes where the story breathes, accelerates, pauses
        for character, becomes unbearable, and resolves. Does not mention specific
        clue IDs or mechanism details. Does not name the culprit.
        Must be multiple paragraphs — a single dense paragraph does not meet this requirement.
    turningPoints:
      type: array
      required: true
      items:
        type: object
        fields:
          position:
            type: string
            required: true
            allowed: [opening, early, first_turn, mid, second_turn, pre_climax, climax, resolution]
          emotionalDescription:
            type: string
            required: true
            description: "One sentence describing the emotional shift at this story position."
    endingNote:
      type: string
      required: true
      description: >
        What should linger with the reader after the final page. One sentence.
        E.g. "The satisfaction of the solved puzzle undercut by the realisation
        that the real damage was done long before the murder."

# ── Section 6 ──────────────────────────────────────────────────────────────────
# Humour Placement Map
# Scene-position × character × permitted form. This is consumed by Agent 7
# when adding per-scene emotional register notes to the outline.
humourPlacementMap:
  type: array
  required: true
  items:
    type: object
    fields:
      scenePosition:
        type: string
        required: true
        allowed:
          - opening_scene
          - first_investigation
          - body_discovery
          - first_interview
          - domestic_scene
          - mid_investigation
          - second_interview
          - tension_scene
          - pre_climax
          - discriminating_test
          - revelation
          - resolution
      humourPermission:
        type: string
        required: true
        allowed: [permitted, conditional, forbidden]
      condition:
        type: string
        required: false
        description: "Present when humourPermission is 'conditional'. States the condition."
      permittedCharacters:
        type: array
        required: false
        items: string
        description: >
          Names of characters who may carry wit in this scene type.
          Empty if humourPermission is 'forbidden'.
      permittedForms:
        type: array
        required: false
        items: string
        description: >
          Allowed humour forms for this scene type. Values from:
          understatement, dry_wit, polite_savagery, self_deprecating,
          observational, deadpan. Empty if humourPermission is 'forbidden'.
      rationale:
        type: string
        required: true
        description: >
          One sentence explaining why this permission applies at this scene position.

# ── Story Theme ────────────────────────────────────────────────────────────────
# The governing synthesis statement — what this story is really about.
storyTheme:
  type: string
  required: true
  description: >
    One sentence. The story's deeper meaning — what it is really about beneath the plot
    mechanics. Must connect to CASE.meta.theme if present. Governs the entire World Document:
    the emotional arc, the character portraits, the humour map should all be inflected by this.
    E.g. 'A story about the violence that respectability does to truth.'
    E.g. 'A study in how love and debt produce the same desperation.'
    Agent 9 uses this to ensure the prose accumulates meaning, not just incident.

# ── Break Moment ───────────────────────────────────────────────────────────────
# The scene where emotional control fails. Every story needs one.
breakMoment:
  type: object
  required: true
  description: >
    The pre-identified moment where someone loses emotional control. Must happen once.
    Need not be the culprit. Grounds the procedural story in human experience and
    prevents the prose from feeling entirely clinical.
  fields:
    character:
      type: string
      required: true
      description: "Name of the character who breaks. Must be in CASE.cast."
    scenePosition:
      type: string
      required: true
      allowed: [first_investigation, first_interview, domestic_scene, mid_investigation, second_interview, tension_scene, pre_climax]
      description: "Approximate story position where this break occurs."
    form:
      type: string
      required: true
      description: >
        How they break — briefly and concretely. E.g. 'Begins weeping unexpectedly when
        asked about the garden' or 'Laughs too long at something not funny, then cannot
        stop' or 'Admits they are completely frightened and has been since the first night.'
    narrativeFunction:
      type: string
      required: true
      description: >
        One sentence. What this break moment does for the story beyond destabilizing the
        procedural tone. E.g. 'Forces the detective to reconsider whether this suspect is
        performing grief or finally unable to contain real guilt.'

# ── Reveal Implications ────────────────────────────────────────────────────────
# What the final reveal retroactively recontextualizes.
revealImplications:
  type: string
  required: true
  description: >
    90–150 words. Names 2–3 specific earlier moments or exchanges that will feel entirely
    different once the reader knows the truth. The best reveals do not just surprise — they
    wound, because they recolor earlier warmth as manipulation, earlier help as calculation,
    earlier grief as performance. Agent 9 uses this to seed those earlier moments with the
    right texture so the recontextualization is earnable.
    E.g. 'The scene where she volunteered to sit with the body — she was not being kind.
    Her warmth toward the detective throughout was management, not trust. The one true moment
    — her distress at the mention of the garden — was the only thing she did not control.'

# ── Validation confirmation ────────────────────────────────────────────────────
# The World Builder LLM confirms these guarantees at end of generation.
validationConfirmations:
  type: object
  required: true
  fields:
    noNewCharacterFacts:
      type: boolean
      required: true
      description: "All character information is derived from CML + character profiles only."
    noNewPlotFacts:
      type: boolean
      required: true
      description: "Story arc section does not name the culprit or reveal mechanism specifics."
    castComplete:
      type: boolean
      required: true
      description: "All cast members appear in characterPortraits and characterVoiceSketches."
    eraSpecific:
      type: boolean
      required: true
      description: >
        historicalMoment.currentTensions contains at least one specific dateable event
        or measure, not generic decade description.
    lockedFactsPreserved:
      type: boolean
      required: true
      description: "Hard logic locked facts are not contradicted anywhere in this document."
    humourMapComplete:
      type: boolean
      required: true
      description: "humourPlacementMap covers all required scenePosition values."

cost:
  type: number
  required: true

durationMs:
  type: number
  required: true
