CML_VERSION:
  type: number
  required: true
  allowed: [2.0]

CASE:
  required: true
  type: object
  fields:

    meta:
      required: true
      type: object
      fields:
        title: { type: string, required: true }
        author: { type: string, required: true }
        license: { type: string, required: true }
        era:
          type: object
          required: true
          fields:
            decade:
              type: string
              required: true
            specific_year:
              type: number
              required: false
              description: "Specific year, e.g. 1941. Required for wartime stories; strongly recommended for all."
            specific_month:
              type: string
              required: false
              description: "Month name, e.g. November. Required for wartime stories."
            wartime:
              type: boolean
              required: false
              description: "True if the story is set during September 1939 – August 1945."
            realism_constraints:
              type: array
              items: string
            era_atmosphere:
              type: string
              required: false
              description: "One sentence. The dominant emotional register of this historical moment for civilians in this setting."
        setting:
          type: object
          required: true
          fields:
            location: { type: string, required: true }
            place: { type: string, required: false }
            country: { type: string, required: false }
            institution: { type: string, required: true }
        crime_class:
          type: object
          required: true
          fields:
            category:
              type: string
              allowed: [murder, theft, disappearance, fraud]
            subtype: { type: string, required: true }
        theme:
          type: string
          required: false
          description: >
            The story's deeper subject — what it is really about beneath the plot mechanics.
            One sentence. Not the plot summary. E.g. 'The cost of protecting a secret' or
            'How ambition corrupts loyalty' or 'The violence that respectability does to truth.'
            Used by Agent 6.5 to anchor the World Document and by Agent 9 to give prose soul.

    cast:
      required: true
      type: array
      items:
        type: object
        fields:
          name: { type: string, required: true }
          age_range: { type: string, required: true }
          role_archetype: { type: string, required: true }
          relationships:
            type: array
            items: string
          public_persona: { type: string, required: true }
          private_secret: { type: string, required: true }
          motive_seed: { type: string, required: true }
          motive_strength: { type: string, required: true }
          alibi_window: { type: string, required: true }
          access_plausibility: { type: string, required: true }
          opportunity_channels:
            type: array
            items: string
          behavioral_tells:
            type: array
            items: string
          stakes: { type: string, required: true }
          evidence_sensitivity:
            type: array
            items: string
          culprit_eligibility:
            type: string
            allowed: [eligible, ineligible, locked]
          culpability:
            type: string
            allowed: [guilty, innocent, unknown]
          gender:
            type: string
            required: false
            allowed: [male, female, non-binary]
          role:
            type: string
            required: false
            allowed: [detective, victim, culprit, suspect, witness, bystander]
            description: >
              This character's functional role in the story. Machine-readable complement to
              role_archetype. 'victim' here is the canonical signal used by prose agents to
              identify the murder victim — more reliable than substring-searching role_archetype.
          moral_complexity:
            type: string
            required: false
            description: >
              One sentence. Why this character is not simply good or bad. Especially required
              for the victim (were they entirely innocent? what did they do that made some
              people not sorry?) and for the culprit (why does their action almost make sense?).

    culpability:
      required: true
      type: object
      fields:
        culprit_count:
          type: number
          required: true
          allowed: [1, 2]
        culprits:
          type: array
          required: true
          items: string

    surface_model:
      required: true
      type: object
      fields:
        narrative:
          type: object
          fields:
            summary: { type: string, required: true }
        accepted_facts:
          type: array
          items: string
          required: true
        inferred_conclusions:
          type: array
          items: string
          required: true

    hidden_model:
      required: true
      type: object
      fields:
        mechanism:
          type: object
          required: true
          fields:
            description: { type: string, required: true }
            delivery_path:
              type: array
              items:
                type: object
                fields:
                  step: { type: string, required: true }
        outcome:
          type: object
          required: true
          fields:
            result: { type: string, required: true }

    false_assumption:
      required: true
      type: object
      fields:
        statement: { type: string, required: true }
        type:
          type: string
          allowed: [temporal, spatial, identity, behavioral, authority]
        why_it_seems_reasonable: { type: string, required: true }
        what_it_hides: { type: string, required: true }

    constraint_space:
      required: true
      type: object
      fields:
        time:
          type: object
          fields:
            anchors: { type: array, items: string }
            windows: { type: array, items: string }
            contradictions: { type: array, items: string }
        access:
          type: object
          fields:
            actors: { type: array, items: string }
            objects: { type: array, items: string }
            permissions: { type: array, items: string }
        physical:
          type: object
          fields:
            laws: { type: array, items: string }
            traces: { type: array, items: string }
        social:
          type: object
          fields:
            trust_channels: { type: array, items: string }
            authority_sources: { type: array, items: string }

    inference_path:
      required: true
      type: object
      fields:
        steps:
          type: array
          required: true
          min_items: 3
          items:
            type: object
            fields:
              observation: { type: string, required: true }
              correction: { type: string, required: true }
              effect: { type: string, required: true }
              required_evidence:
                type: array
                required: false
                items: string
              reader_observable:
                type: boolean
                required: false

    discriminating_test:
      required: true
      type: object
      fields:
        method:
          type: string
          allowed: [reenactment, trap, constraint_proof, administrative_pressure]
        design: { type: string, required: true }
        knowledge_revealed: { type: string, required: true }
        pass_condition: { type: string, required: true }

    fair_play:
      required: true
      type: object
      fields:
        all_clues_visible: { type: boolean, required: true }
        no_special_knowledge_required: { type: boolean, required: true }
        no_late_information: { type: boolean, required: true }
        reader_can_solve: { type: boolean, required: true }
        explanation: { type: string, required: true }

    quality_controls:
      required: true
      type: object
      fields:
        inference_path_requirements:
          required: true
          type: object
          fields:
            min_steps: { type: number, required: true }
            max_steps: { type: number, required: true }
            require_observation_correction_effect: { type: boolean, required: true }
        clue_visibility_requirements:
          required: true
          type: object
          fields:
            essential_clues_min: { type: number, required: true }
            essential_clues_before_test: { type: boolean, required: true }
            early_clues_min: { type: number, required: true }
            mid_clues_min: { type: number, required: true }
            late_clues_min: { type: number, required: true }
        discriminating_test_requirements:
          required: true
          type: object
          fields:
            timing:
              type: string
              required: true
              allowed: [late_act2, early_act3, mid_act3]
            must_reference_inference_step: { type: boolean, required: true }
    prose_requirements:
      required: false
      type: object
      description: "Explicit prose validation requirements to guide Agent 9 generation"
      fields:
        discriminating_test_scene:
          type: object
          required: false
          fields:
            act_number: { type: number, required: true }
            scene_number: { type: number, required: true }
            required_elements:
              type: array
              required: true
              items: string
            test_type: { type: string, required: true }
        
        suspect_clearance_scenes:
          type: array
          required: false
          items:
            type: object
            fields:
              suspect_name: { type: string, required: true }
              act_number: { type: number, required: true }
              scene_number: { type: number, required: true }
              clearance_method: { type: string, required: true }
              supporting_clues:
                type: array
                required: false
                items: string
        
        culprit_revelation_scene:
          type: object
          required: false
          fields:
            act_number: { type: number, required: true }
            scene_number: { type: number, required: true }
            revelation_method: { type: string, required: true }
        
        identity_rules:
          type: array
          required: false
          items:
            type: object
            fields:
              character_name: { type: string, required: true }
              revealed_in_act: { type: number, required: false }
              before_reveal_reference: { type: string, required: true }
              after_reveal_reference: { type: string, required: true }
        
        clue_to_scene_mapping:
          type: array
          required: false
          items:
            type: object
            fields:
              clue_id: { type: string, required: true }
              act_number: { type: number, required: true }
              scene_number: { type: number, required: false }
              delivery_method: { type: string, required: false }

# =============================================================================
# COMPOSITE SECTIONS
# These top-level sections are populated by upstream agents as the pipeline
# progresses. Together with CASE they form the Full CML — the single source
# of truth for prose generation.
#
# Each section delegates structural validation to its own sub-schema via $ref.
# The sub-schema is the single source of truth — no duplication here.
#
# Population order:
#   SETTING_REFINEMENT   — Agent 1    — $ref: setting_refinement.schema.yaml
#   CHARACTER_PROFILES   — Agent 2b   — $ref: character_profiles.schema.yaml
#   LOCATION_PROFILES    — Agent 2c   — $ref: location_profiles.schema.yaml
#   TEMPORAL_CONTEXT     — Agent 2d   — $ref: temporal_context.schema.yaml
#   WORLD_DOCUMENT       — Agent 6.5  — $ref: world_document.schema.yaml
#   NARRATIVE_OUTLINE    — Agent 7    — $ref: narrative_outline.schema.yaml
# =============================================================================

SETTING_REFINEMENT:
  required: false
  $ref: setting_refinement.schema.yaml

CHARACTER_PROFILES:
  required: false
  $ref: character_profiles.schema.yaml

LOCATION_PROFILES:
  required: false
  $ref: location_profiles.schema.yaml

TEMPORAL_CONTEXT:
  required: false
  $ref: temporal_context.schema.yaml

WORLD_DOCUMENT:
  required: false
  $ref: world_document.schema.yaml

NARRATIVE_OUTLINE:
  required: false
  $ref: narrative_outline.schema.yaml